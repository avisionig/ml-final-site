<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ML Quiz Prep</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #68738a;
      --line: #e2e7f0;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --good: #16a34a;
      --bad: #dc2626;
      --warn: #f59e0b;
      --shadow: 0 20px 50px rgba(23, 32, 51, .10);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, .12), transparent 32rem),
        radial-gradient(circle at bottom right, rgba(22, 163, 74, .10), transparent 34rem),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .app { max-width: 1180px; margin: 0 auto; padding: 28px; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 18px; margin-bottom: 22px;
    }
    .brand h1 { margin: 0; font-size: clamp(26px, 4vw, 42px); letter-spacing: -0.04em; }
    .brand p { margin: 8px 0 0; color: var(--muted); }
    .top-actions { display:flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    button, .select {
      border: 0; border-radius: 14px; padding: 11px 15px;
      font-weight: 700; cursor: pointer; font-size: 14px;
      transition: transform .08s ease, box-shadow .18s ease, background .18s ease;
    }
    button:active { transform: translateY(1px); }
    .btn-primary { background: var(--accent); color: white; box-shadow: 0 10px 20px rgba(37, 99, 235, .20); }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-secondary { background: #eaf0ff; color: #1e3a8a; }
    .btn-ghost { background: #fff; color: var(--text); border: 1px solid var(--line); }
    .btn-danger { background: #fee2e2; color: #991b1b; }
    .layout { display: grid; grid-template-columns: 1fr 320px; gap: 22px; align-items: start; }
    .card { background: rgba(255,255,255,.88); backdrop-filter: blur(10px); border: 1px solid rgba(226,231,240,.9); border-radius: var(--radius); box-shadow: var(--shadow); }
    .main-card { padding: 28px; min-height: 560px; }
    .side-card { padding: 18px; position: sticky; top: 18px; }
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 18px; }
    .stat { background: #f8fafc; border: 1px solid var(--line); border-radius: 16px; padding: 12px; }
    .stat b { display: block; font-size: 20px; }
    .stat span { color: var(--muted); font-size: 12px; }
    .progress-wrap { margin-bottom: 22px; }
    .progress-label { display:flex; justify-content: space-between; color: var(--muted); font-size: 13px; margin-bottom: 7px; }
    .progress { height: 12px; background: #e5e7eb; border-radius: 999px; overflow: hidden; }
    .progress > div { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), #22c55e); transition: width .25s ease; }
    .question-meta { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom: 14px; }
    .pill { display:inline-flex; align-items:center; gap:6px; padding: 7px 10px; border-radius: 999px; font-size: 13px; font-weight: 700; }
    .pill.blue { background:#dbeafe; color:#1d4ed8; }
    .pill.gray { background:#f1f5f9; color:#475569; }
    .pill.green { background:#dcfce7; color:#166534; }
    .pill.red { background:#fee2e2; color:#991b1b; }
    .question h2 { margin: 0 0 14px; font-size: clamp(22px, 3vw, 32px); letter-spacing: -0.03em; line-height:1.15; }
    .body { color: #27344d; margin: 12px 0 18px; }
    pre { background: #0f172a; color: #e2e8f0; padding: 16px; border-radius: 16px; overflow: auto; font-size: 14px; line-height: 1.5; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .options { display:grid; gap: 12px; margin: 18px 0; }
    .option {
      display:flex; align-items:flex-start; gap: 12px; padding: 16px;
      border: 2px solid var(--line); border-radius: 18px; background:#fff;
      cursor: pointer; transition: border-color .18s ease, background .18s ease, transform .08s ease;
    }
    .option:hover { border-color: #93c5fd; background: #f8fbff; }
    .option input { margin-top: 2px; accent-color: var(--accent); }
    .option.correct { border-color: rgba(22, 163, 74, .65); background:#f0fdf4; }
    .option.incorrect { border-color: rgba(220, 38, 38, .6); background:#fef2f2; }
    .text-answer { width:100%; padding: 15px 16px; border: 2px solid var(--line); border-radius: 16px; font-size: 16px; outline: none; }
    .text-answer:focus { border-color: #93c5fd; box-shadow: 0 0 0 4px rgba(147,197,253,.25); }
    .feedback { margin-top: 18px; padding: 15px 16px; border-radius: 16px; font-weight: 700; display:none; }
    .feedback.good { display:block; background:#dcfce7; color:#166534; }
    .feedback.bad { display:block; background:#fee2e2; color:#991b1b; }
    .controls { display:flex; gap: 10px; justify-content: space-between; flex-wrap:wrap; margin-top: 24px; }
    .controls .left, .controls .right { display:flex; gap:10px; flex-wrap:wrap; }
    .grid-title { display:flex; align-items:center; justify-content: space-between; margin-bottom: 12px; }
    .grid-title h3 { margin:0; }
    .qgrid { display:grid; grid-template-columns: repeat(5, 1fr); gap: 7px; max-height: 390px; overflow:auto; padding-right: 4px; }
    .qbtn {
      height: 38px; padding: 0; border-radius: 12px; background:#f8fafc; border: 1px solid var(--line); color:#334155;
      font-weight: 800;
    }
    .qbtn.active { background:#dbeafe; border-color:#60a5fa; color:#1d4ed8; }
    .qbtn.answered { background:#fef3c7; border-color:#fbbf24; color:#92400e; }
    .qbtn.correct { background:#dcfce7; border-color:#86efac; color:#166534; }
    .qbtn.incorrect { background:#fee2e2; border-color:#fca5a5; color:#991b1b; }
    .results { display:none; margin-top: 18px; padding: 18px; border-radius: 18px; background:#f8fafc; border:1px solid var(--line); }
    .results.show { display:block; }
    .result-score { font-size: 42px; font-weight: 900; letter-spacing: -0.04em; margin: 0; }
    .mistakes { margin-top: 14px; max-height: 300px; overflow:auto; }
    .mistake { padding: 12px; border-bottom: 1px solid var(--line); }
    .mistake:last-child { border-bottom:0; }
    .small { color: var(--muted); font-size: 13px; }
    .search { width:100%; padding: 11px 12px; border:1px solid var(--line); border-radius: 13px; margin-bottom: 12px; outline:none; }
    .hidden { display:none !important; }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .side-card { position: static; }
      header { align-items:flex-start; flex-direction:column; }
      .top-actions { justify-content:flex-start; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <h1>ML Quiz Test</h1>
        <p>180 вопросов: True/False, multiple choice и fill in the blank.</p>
      </div>
      <div class="top-actions">
        <button class="btn-secondary" id="shuffleBtn">Shuffle</button>
        <button class="btn-ghost" id="examBtn">Exam mode: OFF</button>
        <button class="btn-danger" id="resetBtn">Reset</button>
      </div>
    </header>

    <div class="layout">
      <main class="card main-card">
        <div class="progress-wrap">
          <div class="progress-label"><span id="progressText">0 / 150 answered</span><span id="percentText">0%</span></div>
          <div class="progress"><div id="progressBar"></div></div>

        <section class="question" id="questionBox"></section>

      </aside>
    </div>
  </div>

<script>

function shuffleOptionsDeterministic(questions) {
  function seededRandom(seed) {
    let x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
  }

  function shuffleWrongOptions(arr, seed) {
    const a = [...arr];

    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(seededRandom(seed + i * 17) * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }

    return a;
  }

  return questions.map((q) => {
    if (q.type !== "choice" || !q.options || q.options.length === 0) {
      return q;
    }

    const answer = q.answer;

    if (!q.options.includes(answer)) {
      return q;
    }

    const wrongOptions = q.options.filter((opt) => opt !== answer);

    const mixedWrong = shuffleWrongOptions(wrongOptions, q.id * 31);

    const optionCount = q.options.length;

    // Correct answer position changes by question id:
    // sometimes 0, sometimes 1, sometimes 2, sometimes 3
    const correctIndex = (q.id * 7 + 3) % optionCount;

    mixedWrong.splice(correctIndex, 0, answer);

    return {
      ...q,
      options: mixedWrong
    };
  });
}

:","body":"","type":"choice","options":["detecting patterns and building a predictive model","memorizing only row indices","never using parameters","using only duplicate rows"],"answer":"detecting patterns and building a predictive model","id":17},{"title":"Overfitting usually happens when the model is:","body":"","type":"choice","options":["too complex and memorizes training data","too simple to learn patterns","never trained","only a column name"],"answer":"too complex and memorizes training data","id":18},{"title":"Underfitting usually happens when the model is:","body":"","type":"choice","options":["too simple or features are not informative enough","perfectly memorizing the training set","using too many categories only","stored with joblib"],"answer":"too simple or features are not informative enough","id":19},{"title":"The error rate on new cases is called:","body":"","type":"choice","options":["generalization error","training instance","feature name","column selector"],"answer":"generalization error","id":20},{"title":"The test set should usually be kept untouched until the final evaluation.","body":"","type":"choice","options":["True","False"],"answer":"True","id":21},{"title":"What is the target variable in the California Housing project?","body":"","type":"choice","options":["median_house_value","ocean_proximity","longitude","total_rooms"],"answer":"median_house_value","id":22},{"title":"The California Housing task is framed as:","body":"","type":"choice","options":["supervised regression","unsupervised clustering only","reinforcement learning","text classification"],"answer":"supervised regression","id":23},{"title":"The housing problem is multiple regression because several input features are used to predict the target.","body":"","type":"choice","options":["True","False"],"answer":"True","id":24},{"title":"The housing problem is multivariate regression because it predicts many target values for each district.","body":"","type":"choice","options":["True","False"],"answer":"False","id":25},{"title":"For the housing project, plain batch learning is reasonable because:","body":"","type":"choice","options":["the data is small enough and there is no continuous flow requiring rapid updates","the target is categorical","the dataset has no labels","the model must update every second"],"answer":"the data is small enough and there is no continuous flow requiring rapid updates","id":26},{"title":"The main purpose of checking the current solution is to:","body":"","type":"choice","options":["get a reference for performance and insights","remove the test set","force the use of neural networks","convert all columns to strings"],"answer":"get a reference for performance and insights","id":27},{"title":"A data pipeline is:","body":"","type":"choice","options":["a sequence of data processing components","a single missing value","only a scatter plot","a list of labels without features"],"answer":"a sequence of data processing components","id":28},{"title":"MAE measures:","body":"","type":"choice","options":["the average absolute error","the square root of labels","only the maximum error","the number of features"],"answer":"the average absolute error","id":29},{"title":"RMSE is especially sensitive to:","body":"","type":"choice","options":["large errors and outliers","column names","CSV separators","markdown titles"],"answer":"large errors and outliers","id":30},{"title":"RMSE is always greater than or equal to MAE.","body":"","type":"choice","options":["True","False"],"answer":"True","id":31},{"title":"If the downstream system only needs categories like cheap/medium/expensive, the housing task should be framed as:","body":"","type":"choice","options":["classification","univariate regression","image segmentation","association rule learning"],"answer":"classification","id":32},{"title":"Fill in the blank to load the housing CSV file.","body":"```python\nhousing = pd.___(Path(\"datasets/housing/housing.csv\"))\n```","type":"text","options":[],"answer":"read_csv","id":33},{"title":"What does `housing.info()` show?","body":"","type":"choice","options":["columns, non-null counts, dtypes, memory usage","only the first row","only feature importances","only test RMSE"],"answer":"columns, non-null counts, dtypes, memory usage","id":34},{"title":"Which column in the housing dataset is categorical/object?","body":"","type":"choice","options":["ocean_proximity","median_income","total_rooms","latitude"],"answer":"ocean_proximity","id":35},{"title":"How many entries are in the full California Housing dataset?","body":"","type":"choice","options":["20640","4622","16512","1834"],"answer":"20640","id":36},{"title":"Which feature has missing values in the housing dataset shown in the material?","body":"","type":"choice","options":["total_bedrooms","longitude","median_income","ocean_proximity only"],"answer":"total_bedrooms","id":37},{"title":"Fill in the blank to create a random train/test split with 20% test data.","body":"```python\ntrain_set, test_set = train_test_split(housing, test_size=___, random_state=42)\n```","type":"text","options":[],"answer":"0.2","id":38},{"title":"Stratified sampling ensures:","body":"","type":"choice","options":["proportional representation of strata","equal feature scaling","automatic model training","removal of all outliers"],"answer":"proportional representation of strata","id":39},{"title":"In the material, `pd.cut()` is used to create:","body":"","type":"choice","options":["income_cat","ocean_proximity","final_rmse","feature_importances_"],"answer":"income_cat","id":40},{"title":"What does `pd.cut()` do?","body":"","type":"choice","options":["Discretizes continuous values into bins","Trains a regression model","Encodes text with one-hot vectors","Computes RMSE"],"answer":"Discretizes continuous values into bins","id":41},{"title":"Fill in the blank to create income categories.","body":"```python\nhousing[\"income_cat\"] = pd.cut(housing[\"median_income\"], bins=[0., 1.5, 3.0, 4.5, 6., np.inf], labels=[1, 2, 3, 4, ___])\n```","type":"text","options":[],"answer":"5","id":42},{"title":"After creating a stratified split, `income_cat` should be kept forever as a training feature.","body":"","type":"choice","options":["True","False"],"answer":"False","id":43},{"title":"Why should we explore and visualize only the training set?","body":"","type":"choice","options":["To avoid data leakage from the test set","Because plotting test data is impossible","Because the test set has no columns","Because StandardScaler cannot handle test data"],"answer":"To avoid data leakage from the test set","id":44},{"title":"In geographical scatter plots, `alpha` controls:","body":"","type":"choice","options":["point transparency","the target variable","the number of folds","the missing-value strategy"],"answer":"point transparency","id":45},{"title":"In the geographical visualization, the x and y axes are usually:","body":"","type":"choice","options":["longitude and latitude","median_income and median_house_value only","order_id and quantity","split0 and split1"],"answer":"longitude and latitude","id":46},{"title":"The `c=\"median_house_value\"` argument in the housing scatter plot is used to:","body":"","type":"choice","options":["color points by house value","drop the target column","calculate RMSE","make categories ordinal"],"answer":"color points by house value","id":47},{"title":"Fill in the blank to calculate correlations only on numeric columns.","body":"```python\ncorr_matrix = housing.corr(____=True)\n```","type":"text","options":[],"answer":"numeric_only","id":48},{"title":"Which feature has the strongest positive correlation with `median_house_value` in the shown correlation output?","body":"","type":"choice","options":["median_income","population","longitude","latitude"],"answer":"median_income","id":49},{"title":"Fill in the blank for the attribute combination.","body":"```python\nhousing[\"rooms_per_house\"] = housing[\"total_rooms\"] / housing[\"___\"]\n```","type":"text","options":[],"answer":"households","id":50},{"title":"Fill in the blank for the attribute combination.","body":"```python\nhousing[\"bedrooms_ratio\"] = housing[\"total_bedrooms\"] / housing[\"___\"]\n```","type":"text","options":[],"answer":"total_rooms","id":51},{"title":"Fill in the blank for the attribute combination.","body":"```python\nhousing[\"people_per_house\"] = housing[\"population\"] / housing[\"___\"]\n```","type":"text","options":[],"answer":"households","id":52},{"title":"Before preparing features, labels are usually separated by:","body":"","type":"choice","options":["dropping `median_house_value` from X and copying it as y","dropping all numerical columns","using only the test set","converting labels to ocean_proximity"],"answer":"dropping `median_house_value` from X and copying it as y","id":53},{"title":"Which Scikit-Learn transformer is used to fill missing numerical values with the median?","body":"","type":"choice","options":["SimpleImputer","OneHotEncoder","GridSearchCV","RandomForestRegressor"],"answer":"SimpleImputer","id":54},{"title":"Fill in the blank to create a median imputer.","body":"```python\nimputer = SimpleImputer(strategy=\"___\")\n```","type":"text","options":[],"answer":"median","id":55},{"title":"What does `imputer.fit()` learn from the data?","body":"","type":"choice","options":["the replacement statistics, such as medians","the final test RMSE","the best random forest depth only","the label names"],"answer":"the replacement statistics, such as medians","id":56},{"title":"What is the output of `imputer.transform()`?","body":"","type":"choice","options":["NumPy array","Python dictionary","Raw PDF file","Matplotlib axis only"],"answer":"NumPy array","id":57},{"title":"Ordinal encoding converts categories into:","body":"","type":"choice","options":["integer codes","RMSE scores","missing values","scatter plot points"],"answer":"integer codes","id":58},{"title":"The main disadvantage of ordinal encoding f ure in data","id":186},{"title":"Machine learning is best defined as:","body":"","type":"choice","options":["Programming computers so they can learn from data","Writing explicit rules for every possible case","Storing data in databases for later retrieval","Converting images into text manually"],"answer":"Programming computers so they can learn from data","id":187},{"title":"Which problem arises when a model memorizes training data but performs poorly on unseen data?","body":"","type":"choice","options":["Broadcasting","Underfitting","Overfitting","Feature scaling"],"answer":"Overfitting","id":188},{"title":"Fill in the missing part to make `OneHotEncoder` return an array:","body":"```\ncat_encoder = OneHotEncoder(sparse_output=_)\n```","type":"choice","options":["True","False"],"answer":"False","id":189},{"title":"Which object in Scikit-learn allows sequential transformations followed by a model?","body":"","type":"choice","options":["Pipeline","TransformerStack","Workflow","ChainModel"],"answer":"Pipeline","id":190},{"title":"Which method helps detect overfitting?","body":"","type":"choice","options":["Removing all features","Evaluating performance on a validation/test dataset","Increasing file size","Evaluating performance only on training data"],"answer":"Evaluating performance on a validation/test dataset","id":191},{"title":"Complete the histogram visualization:","body":"```\ndata.____(bins=50)\n```","type":"choice","options":["plot","visualize","hist","show"],"answer":"hist","id":192},{"title":"Which component in Tom Mitchell’s framework represents how performance is evaluated?","body":"","type":"choice","options":["Performance measure P","Experience E","Task T","Training dataset size"],"answer":"Performance measure P","id":193},{"title":"Ordinal encoding may be mistakenly interpreted by models as continuous values.","body":"","type":"choice","options":["False","True"],"answer":"True","id":194},{"title":"Which code displays summary information about DataFrame N assumes linearity"],"answer":"kNN is sensitive to irrelevant features because similarity/distance gets distorted","id":203},{"title":"Which statement best distinguishes batch learning from online learning?","body":"","type":"choice","options":["Batch trains in bulk and is fixed afterward unless retrained; online updates incrementally as new data streams in","Batch is for streaming only; online is for static datasets only","They are identical; “online” just means “on the internet”","Batch updates continuously; online is fixed after training"],"answer":"Batch trains in bulk and is fixed afterward unless retrained; online updates incrementally as new data streams in","id":204},{"title":"Online learning updates may be less stable because noisy incoming data can mislead the model.","body":"","type":"choice","options":["True","False"],"answer":"True","id":205},{"title":"Overfitting is strong training performance but poor generalization. Which action is NOT a remedy?","body":"","type":"choice","options":["Gather more training data","Reduce noise","Increase model complexity","Simplify the model / reduce parameters"],"answer":"Increase model complexity","id":206},{"title":"Consider the code. Which statement is most accurate?","body":"```\nknn.fit(X_train, y_train)acc = knn.score(X_train, y_train)print(acc)\n```","type":"choice","options":["This prints validation accuracy by default","This prints training accuracy; it may be optimistic vs test accuracy","This prints the generalization error","This prints ROC-AUC"],"answer":"This prints training accuracy; it may be optimistic vs test accuracy","id":207},{"title":"The test set is used to estimate the generalization / out-of-sample error.","body":"","type":"choice","options":["True","False"],"answer":"True","id":208},{"title":"In the Iris flower example, you have one new iris sample. Which is the best way to make it valid for `knn.predict(...)`?","body":"```\nx = np.array([5, 2.9, 1, 0.2])\n```","type":"choice","options":["knn.predict(x.reshape(1, 4))","knn.predict(x.reshape(4, 1))","knn.predict(x)","knn.predict(np.array([[x]]))"],"answer":"knn.predict(x.reshape(1, 4))","id":209},{"title":"Which workflow should be followed?","body":"","type":"choice","options":["Train on train → tune on test → report test","Train on train → evaluate on train → report train","Train on train → tune on validation → retrain on full train / train+val → evaluate once on test","Train on full data → tune on test → retrain on test+train → report validation"],"answer":"Train on train → tune on validation → retrain on full train / train+val → evaluate once on test","id":210},{"title":"A model is underfitting / has high bias. Which option matches the material’s fixes?","body":"","type":"choice","options":["Collect more data","Reduce model power and add regularization","Select a more powerful model OR feed better features OR reduce constraints, such as regularization","Use online learning"],"answer":"Select a more powerful model OR feed better features OR reduce constraints, such as regularization","id":211},{"title":"Which limitation is explicitly emphasized for instance-based / lazy learning?","body":"","type":"choice","options":["It must store the entire dataset and predictions can be slow on large datasets","It cannot adapt to new data","It requires deep neural networks","It always suffers from underfitting"],"answer":"It must store the entire dataset and predictions can be slow on large datasets","id":212},{"title":"Mini-batch learning is presented as:","body":"","type":"choice","options":["Strictly one sample at a time","Strictly the entire dataset at once","A middle ground using small batches, such as 32 / 64 / 128, balancing efficiency and stability","Only for kNN"],"answer":"A middle ground using small batches, such as 32 / 64 / 128, balancing efficiency and stability","id":213},{"title":"Data mismatch occurs when training and test data come from different distributions.","body":"","type":"choice","options":["True","False"],"answer":"True","id":214},{"title":"Most transformers provide a `get_feature_names_out()` method that you can use to build a DataFrame around the transformer’s output.","body":"","type":"choice","options":["False","True"],"answer":"True","id":215},{"title":"Fill in the blank","body":"The target is scaled using `StandardScaler`.\n\n```\nscaled_predictions = model.predict(some_new_data)predictions = target_scaler.______transform(scaled_predictions)\n```","type":"choice","options":["fit","inverse_","inverse","transform"],"answer":"inverse_","id":216},{"title":"Small gamma in RBF leads to a less localized curve.","body":"","type":"choice","options":["False","True"],"answer":"True","id":217},{"title":"Does `MinMaxScaler` scale the feature to a range of 0 to 1 only?","body":"","type":"choice","options":["No","Yes"],"answer":"No","id":218},{"title":"Fill in the blank","body":"```\nmodel = TransformedTargetRegressor(LinearRegression(), _______=StandardScaler())\n```","type":"choice","options":["scaler","transformer","target_scaler","preprocessor"],"answer":"transformer","id":219},{"title":"Fill in the blank","body":"You want to apply log transformation without the inverse function.\n\n```\nimport numpy as npfrom sklearn.preprocessing import FunctionTransformer\nlog_transformer = FunctionTransformer(_____)\n```","type":"choice","options":["false","np.log","np.exp","log"],"answer":"np.log","id":220},{"title":"To approximate the feature distribution to a normal distribution, we should raise the feature to a power other than one.","body":"","type":"choice","options":["False","True"],"answer":"True","id":221},{"title":"Which encoder increases dimensionality?","body":"","type":"choice","options":["OneHot encoder","Target encoder","Ordinal encoder","Label encoder"],"answer":"OneHot encoder","id":222},{"title":"RBF kernel treats multidimensional input.","body":"","type":"choice","options":["False","True"],"answer":"True","id":223},{"title":"As the data points move away from the reference center, RBF similarity is exponentially increasing.","body":"","type":"choice","options":["True","False"],"answer":"False","id":224},{"title":"If you need the feature distribution approximately uniform, you can use bucketizing with quantiles.","body":"","type":"choice","options":["True","False"],"answer":"True","id":225},{"title":"Fill in the blank","body":"```\nsf_transformer = FunctionTransformer(    rbf_kernel,    kw_args=dict(Y=[sf_coords], _____=0.1))\n```","type":"choice","options":["gamma","alpha","scale","sigma"],"answer":"gamma","id":226},{"title":"MinMax scaling restricts values to a specific range.","body":"","type":"choice","options":["False","True"],"answer":"True","id":227},{"title":"Fill in the blank","body":"```\ndf_housing_num_std_scaled = pd.DataFrame(    housing_num_std_scaled,    columns=std_scaler.get_feature_names_out(),    index=housing_num._____)\n```","type":"choice","options":["scaler","index","columns","shape"],"answer":"index","id":228},{"title":"Fill in the blank","body":"```\nsimilarity_35 = rbf_kernel(ages, center, ____=0.02)\n```","type":"choice","options":["gamma","alpha","scale","sigma"],"answer":"gamma","id":229}];
let questions = shuffleOptionsDeterministic(
  JSON.parse(JSON.stringify(ORIGINAL_QUESTIONS))
);
let current = 0;
let examMode = false;
const STORAGE_KEY = 'ml_quiz_229_state_v2_shuffled_options';
let state = loadState();

function defaultState() {
  const answers = {};
  const checked = {};
  const correct = {};
  return { answers, checked, correct, order: questions.map(q => q.id) };
}
function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (saved && saved.answers) return saved;
  } catch(e) {}
  return defaultState();
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]));
}
function renderBody(body) {
  if (!body) return '';
  return body.replace(/```(?:python)?\n([\s\S]*?)```/g, (_, code) => `<pre><code>${escapeHtml(code.trim())}</code></pre>`)
             .replace(/`([^`]+)`/g, '<code>$1</code>')
             .replace(/\n/g, '<br>');
}
function normalizeAnswer(v) {
  return String(v ?? '').trim().replace(/^`|`$/g, '').replace(/\s+/g, '').toLowerCase();
}
function isCorrect(q, value) {
  if (q.type === 'text') return normalizeAnswer(value) === normalizeAnswer(q.answer);
  return String(value ?? '') === String(q.answer);
}
function currentQuestion() { return questions[current]; }
function renderQuestion() {
  const q = currentQuestion();
  const userValue = state.answers[q.id] ?? '';
  const isChecked = !!state.checked[q.id];
  const qBox = document.getElementById('questionBox');
  const typeLabel = q.type === 'text' ? 'Fill in the blank' : (q.options.length === 2 && q.options.includes('True') && q.options.includes('False') ? 'True / False' : 'Multiple choice');
  let html = `
    <div class="question-meta">
      <span class="pill blue">Question ${current + 1} / ${questions.length}</span>
      <span class="pill gray">${typeLabel}</span>
      <span class="pill gray">1 point</span>
    </div>
    <h2>${escapeHtml(q.title)}</h2>
    <div class="body">${renderBody(q.body)}</div>
  `;
  if (q.type === 'choice') {
    html += '<div class="options">';
    q.options.forEach((opt, idx) => {
      let cls = 'option';
      if (isChecked && !examMode) {
        if (opt === q.answer) cls += ' correct';
        else if (opt === userValue) cls += ' incorrect';
      }
      html += `<label class="${cls}"><input type="radio" name="answer" value="${escapeHtml(opt)}" ${opt === userValue ? 'checked' : ''}> <span>${escapeHtml(opt)}</span></label>`;
    });
    html += '</div>';
  } else {
    html += `<input class="text-answer" id="textAnswer" placeholder="Введите ответ" value="${escapeHtml(userValue)}" />`;
  }
  qBox.innerHTML = html;
  document.querySelectorAll('input[name="answer"]').forEach(input => {
    input.addEventListener('change', e => { state.answers[q.id] = e.target.value; saveState(); updateStats(); renderGrid(); clearFeedback(); });
  });
  const textInput = document.getElementById('textAnswer');
  if (textInput) {
    textInput.addEventListener('input', e => { state.answers[q.id] = e.target.value; saveState(); updateStats(); renderGrid(); clearFeedback(); });
    textInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkCurrent(); });
  }
  renderFeedback();
  updateStats();
  renderGrid();
}
function clearFeedback() {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';
}
function renderFeedback(forceShowAnswer=false) {
  const q = currentQuestion();
  const fb = document.getElementById('feedback');
  if (examMode && !forceShowAnswer) { clearFeedback(); return; }
  if (forceShowAnswer) {
    fb.className = 'feedback good';
    fb.innerHTML = `Correct answer: <code>${escapeHtml(q.answer)}</code>`;
    return;
  }
  if (!state.checked[q.id]) { clearFeedback(); return; }
  const good = !!state.correct[q.id];
  fb.className = 'feedback ' + (good ? 'good' : 'bad');
  fb.innerHTML = good ? 'Correct ✅' : `Incorrect ❌ Correct answer: <code>${escapeHtml(q.answer)}</code>`;
}
function checkCurrent() {
  const q = currentQuestion();
  const val = state.answers[q.id];
  if (val === undefined || String(val).trim() === '') {
    const fb = document.getElementById('feedback');
    fb.className = 'feedback bad';
    fb.textContent = 'Choose or enter an answer first.';
    return;
  }
  state.checked[q.id] = true;
  state.correct[q.id] = isCorrect(q, val);
  saveState();
  renderQuestion();
}
function updateStats() {
  const total = questions.length;
  const answered = questions.filter(q => state.answers[q.id] !== undefined && String(state.answers[q.id]).trim() !== '').length;
  const checked = questions.filter(q => state.checked[q.id]).length;
  const correct = questions.filter(q => state.correct[q.id]).length;
  const wrong = checked - correct;
  document.getElementById('answeredStat').textContent = answered;
  document.getElementById('correctStat').textContent = correct;
  document.getElementById('wrongStat').textContent = wrong;
  document.getElementById('progressText').textContent = `${answered} / ${total} answered`;
  const pct = Math.round(answered / total * 100);
  document.getElementById('percentText').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
}
function renderGrid() {
  const grid = document.getElementById('questionGrid');
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  grid.innerHTML = '';
  questions.forEach((q, idx) => {
    if (query && !(q.title.toLowerCase().includes(query) || String(q.id).includes(query))) return;
    let cls = 'qbtn';
    if (idx === current) cls += ' active';
    if (state.answers[q.id] !== undefined && String(state.answers[q.id]).trim() !== '') cls += ' answered';
    if (state.checked[q.id] && state.correct[q.id]) cls += ' correct';
    if (state.checked[q.id] && state.correct[q.id] === false) cls += ' incorrect';
    const btn = document.createElement('button');
    btn.className = cls;
    btn.textContent = idx + 1;
    btn.onclick = () => { current = idx; document.getElementById('resultsBox').classList.remove('show'); renderQuestion(); };
    grid.appendChild(btn);
  });
}
function finishTest() {
  questions.forEach(q => {
    const val = state.answers[q.id];
    if (val !== undefined && String(val).trim() !== '') {
      state.checked[q.id] = true;
      state.correct[q.id] = isCorrect(q, val);
    }
  });
  saveState();
  const answered = questions.filter(q => state.answers[q.id] !== undefined && String(state.answers[q.id]).trim() !== '').length;
  const correct = questions.filter(q => state.correct[q.id]).length;
  const pct = Math.round(correct / questions.length * 100);
  const mistakes = questions.filter(q => state.checked[q.id] && !state.correct[q.id]);
  const box = document.getElementById('resultsBox');
  box.classList.add('show');
  box.innerHTML = `
    <p class="small">Final result</p>
    <p class="result-score">${correct} / ${questions.length} (${pct}%)</p>
    <p>Answered: <b>${answered}</b>. Wrong checked answers: <b>${mistakes.length}</b>.</p>
    <div class="mistakes">
      ${mistakes.length ? mistakes.map(q => `<div class="mistake"><b>#${questions.indexOf(q)+1}. ${escapeHtml(q.title)}</b><br><span class="small">Your answer: ${escapeHtml(state.answers[q.id]) || '—'}</span><br><span class="small">Correct: <code>${escapeHtml(q.answer)}</code></span></div>`).join('') : '<div class="mistake">No mistakes in checked answers ✅</div>'}
    </div>`;
  updateStats(); renderGrid(); renderQuestion();
  box.scrollIntoView({behavior:'smooth', block:'start'});
}
function shuffleQuestions() {
  questions = [...questions].sort(() => Math.random() - 0.5);
  current = 0;
  document.getElementById('resultsBox').classList.remove('show');
  renderQuestion();
}
function resetAll() {
  if (!confirm('Reset all answers?')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = defaultState();
  current = 0;
  questions = [...ORIGINAL_QUESTIONS];
  document.getElementById('resultsBox').classList.remove('show');
  renderQuestion();
}
document.getElementById('prevBtn').onclick = () => { if (current > 0) current--; document.getElementById('resultsBox').classList.remove('show'); renderQuestion(); };
document.getElementById('nextBtn').onclick = () => { if (current < questions.length - 1) current++; document.getElementById('resultsBox').classList.remove('show'); renderQuestion(); };
document.getElementById('checkBtn').onclick = checkCurrent;
document.getElementById('finishBtn').onclick = finishTest;
document.getElementById('showAnswerBtn').onclick = () => renderFeedback(true);
document.getElementById('shuffleBtn').onclick = shuffleQuestions;
document.getElementById('resetBtn').onclick = resetAll;
document.getElementById('examBtn').onclick = () => {
  examMode = !examMode;
  document.getElementById('examBtn').textContent = 'Exam mode: ' + (examMode ? 'ON' : 'OFF');
  document.getElementById('modeLabel').textContent = examMode ? 'Exam' : 'Practice';
  renderQuestion();
};
document.getElementById('searchInput').addEventListener('input', renderGrid);
document.addEventListener('keydown', e => {
  if (e.altKey && e.key === 'ArrowRight') document.getElementById('nextBtn').click();
  if (e.altKey && e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
});
renderQuestion();
</script>
