<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ML Quiz — 180 Questions</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #68738a;
      --line: #e2e7f0;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --good: #16a34a;
      --bad: #dc2626;
      --warn: #f59e0b;
      --shadow: 0 20px 50px rgba(23, 32, 51, .10);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, .12), transparent 32rem),
        radial-gradient(circle at bottom right, rgba(22, 163, 74, .10), transparent 34rem),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .app { max-width: 1180px; margin: 0 auto; padding: 28px; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 18px; margin-bottom: 22px;
    }
    .brand h1 { margin: 0; font-size: clamp(26px, 4vw, 42px); letter-spacing: -0.04em; }
    .brand p { margin: 8px 0 0; color: var(--muted); }
    .top-actions { display:flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    button, .select {
      border: 0; border-radius: 14px; padding: 11px 15px;
      font-weight: 700; cursor: pointer; font-size: 14px;
      transition: transform .08s ease, box-shadow .18s ease, background .18s ease;
    }
    button:active { transform: translateY(1px); }
    .btn-primary { background: var(--accent); color: white; box-shadow: 0 10px 20px rgba(37, 99, 235, .20); }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-secondary { background: #eaf0ff; color: #1e3a8a; }
    .btn-ghost { background: #fff; color: var(--text); border: 1px solid var(--line); }
    .btn-danger { background: #fee2e2; color: #991b1b; }
    .layout { display: grid; grid-template-columns: 1fr 320px; gap: 22px; align-items: start; }
    .card { background: rgba(255,255,255,.88); backdrop-filter: blur(10px); border: 1px solid rgba(226,231,240,.9); border-radius: var(--radius); box-shadow: var(--shadow); }
    .main-card { padding: 28px; min-height: 560px; }
    .side-card { padding: 18px; position: sticky; top: 18px; }
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 18px; }
    .stat { background: #f8fafc; border: 1px solid var(--line); border-radius: 16px; padding: 12px; }
    .stat b { display: block; font-size: 20px; }
    .stat span { color: var(--muted); font-size: 12px; }
    .progress-wrap { margin-bottom: 22px; }
    .progress-label { display:flex; justify-content: space-between; color: var(--muted); font-size: 13px; margin-bottom: 7px; }
    .progress { height: 12px; background: #e5e7eb; border-radius: 999px; overflow: hidden; }
    .progress > div { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), #22c55e); transition: width .25s ease; }
    .question-meta { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom: 14px; }
    .pill { display:inline-flex; align-items:center; gap:6px; padding: 7px 10px; border-radius: 999px; font-size: 13px; font-weight: 700; }
    .pill.blue { background:#dbeafe; color:#1d4ed8; }
    .pill.gray { background:#f1f5f9; color:#475569; }
    .pill.green { background:#dcfce7; color:#166534; }
    .pill.red { background:#fee2e2; color:#991b1b; }
    .question h2 { margin: 0 0 14px; font-size: clamp(22px, 3vw, 32px); letter-spacing: -0.03em; line-height:1.15; }
    .body { color: #27344d; margin: 12px 0 18px; }
    pre { background: #0f172a; color: #e2e8f0; padding: 16px; border-radius: 16px; overflow: auto; font-size: 14px; line-height: 1.5; }
    code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .options { display:grid; gap: 12px; margin: 18px 0; }
    .option {
      display:flex; align-items:flex-start; gap: 12px; padding: 16px;
      border: 2px solid var(--line); border-radius: 18px; background:#fff;
      cursor: pointer; transition: border-color .18s ease, background .18s ease, transform .08s ease;
    }
    .option:hover { border-color: #93c5fd; background: #f8fbff; }
    .option input { margin-top: 2px; accent-color: var(--accent); }
    .option.correct { border-color: rgba(22, 163, 74, .65); background:#f0fdf4; }
    .option.incorrect { border-color: rgba(220, 38, 38, .6); background:#fef2f2; }
    .text-answer { width:100%; padding: 15px 16px; border: 2px solid var(--line); border-radius: 16px; font-size: 16px; outline: none; }
    .text-answer:focus { border-color: #93c5fd; box-shadow: 0 0 0 4px rgba(147,197,253,.25); }
    .feedback { margin-top: 18px; padding: 15px 16px; border-radius: 16px; font-weight: 700; display:none; }
    .feedback.good { display:block; background:#dcfce7; color:#166534; }
    .feedback.bad { display:block; background:#fee2e2; color:#991b1b; }
    .controls { display:flex; gap: 10px; justify-content: space-between; flex-wrap:wrap; margin-top: 24px; }
    .controls .left, .controls .right { display:flex; gap:10px; flex-wrap:wrap; }
    .grid-title { display:flex; align-items:center; justify-content: space-between; margin-bottom: 12px; }
    .grid-title h3 { margin:0; }
    .qgrid { display:grid; grid-template-columns: repeat(5, 1fr); gap: 7px; max-height: 390px; overflow:auto; padding-right: 4px; }
    .qbtn {
      height: 38px; padding: 0; border-radius: 12px; background:#f8fafc; border: 1px solid var(--line); color:#334155;
      font-weight: 800;
    }
    .qbtn.active { background:#dbeafe; border-color:#60a5fa; color:#1d4ed8; }
    .qbtn.answered { background:#fef3c7; border-color:#fbbf24; color:#92400e; }
    .qbtn.correct { background:#dcfce7; border-color:#86efac; color:#166534; }
    .qbtn.incorrect { background:#fee2e2; border-color:#fca5a5; color:#991b1b; }
    .results { display:none; margin-top: 18px; padding: 18px; border-radius: 18px; background:#f8fafc; border:1px solid var(--line); }
    .results.show { display:block; }
    .result-score { font-size: 42px; font-weight: 900; letter-spacing: -0.04em; margin: 0; }
    .mistakes { margin-top: 14px; max-height: 300px; overflow:auto; }
    .mistake { padding: 12px; border-bottom: 1px solid var(--line); }
    .mistake:last-child { border-bottom:0; }
    .small { color: var(--muted); font-size: 13px; }
    .search { width:100%; padding: 11px 12px; border:1px solid var(--line); border-radius: 13px; margin-bottom: 12px; outline:none; }
    .hidden { display:none !important; }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .side-card { position: static; }
      header { align-items:flex-start; flex-direction:column; }
      .top-actions { justify-content:flex-start; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <h1>ML Quiz Test</h1>
        <p>180 вопросов: True/False, multiple choice и fill in the blank.</p>
      </div>
      <div class="top-actions">
        <button class="btn-secondary" id="shuffleBtn">Shuffle</button>
        <button class="btn-ghost" id="examBtn">Exam mode: OFF</button>
        <button class="btn-danger" id="resetBtn">Reset</button>
      </div>
    </header>

    <div class="layout">
      <main class="card main-card">
        <div class="progress-wrap">
          <div class="progress-label"><span id="progressText">0 / 150 answered</span><span id="percentText">0%</span></div>
          <div class="progress"><div id="progressBar"></div></div>
        </div>

        <section class="question" id="questionBox"></section>

        <div class="feedback" id="feedback"></div>

        <div class="controls">
          <div class="left">
            <button class="btn-ghost" id="prevBtn">← Previous</button>
            <button class="btn-ghost" id="nextBtn">Next →</button>
          </div>
          <div class="right">
            <button class="btn-secondary" id="showAnswerBtn">Show answer</button>
            <button class="btn-primary" id="checkBtn">Check</button>
            <button class="btn-primary" id="finishBtn">Finish test</button>
          </div>
        </div>

        <section class="results" id="resultsBox"></section>
      </main>

      <aside class="card side-card">
        <div class="stats">
          <div class="stat"><b id="answeredStat">0</b><span>Answered</span></div>
          <div class="stat"><b id="correctStat">0</b><span>Correct</span></div>
          <div class="stat"><b id="wrongStat">0</b><span>Wrong</span></div>
        </div>
        <input class="search" id="searchInput" placeholder="Search question..." />
        <div class="grid-title"><h3>Questions</h3><span class="small" id="modeLabel">Practice</span></div>
        <div class="qgrid" id="questionGrid"></div>
      </aside>
    </div>
  </div>

<script>
const ORIGINAL_QUESTIONS = [{"id": 1, "title": "What is Machine Learning?", "body": "", "type": "choice", "options": ["Writing fixed rules for every possible case", "Manually labeling every future prediction", "Programming computers so they can learn from data", "Only building robots"], "answer": "Programming computers so they can learn from data"}, {"id": 2, "title": "In Tom Mitchell's definition, a program learns from experience E if its performance on task T improves according to:", "body": "", "type": "choice", "options": ["the number of Python files", "the size of the screen", "the name of the algorithm", "a performance measure P"], "answer": "a performance measure P"}, {"id": 3, "title": "In the spam filter example, the examples used by the system to learn are called:", "body": "", "type": "choice", "options": ["test labels only", "training set", "model parameters", "deployment logs"], "answer": "training set"}, {"id": 4, "title": "Each training example is called:", "body": "", "type": "choice", "options": ["hyperparameter", "loss function", "training instance or sample", "data pipeline"], "answer": "training instance or sample"}, {"id": 5, "title": "The part of a machine learning system that learns and makes predictions is called:", "body": "", "type": "choice", "options": ["spreadsheet", "index", "repository", "model"], "answer": "model"}, {"id": 6, "title": "Accuracy is often used as a performance measure in classification tasks.", "body": "", "type": "choice", "options": ["False", "True"], "answer": "True"}, {"id": 7, "title": "Automatically classifying images of products on a production line is usually an example of:", "body": "", "type": "choice", "options": ["association rule learning", "manual filtering", "image classification", "time-series smoothing only"], "answer": "image classification"}, {"id": 8, "title": "Detecting tumors in brain scans and assigning a class to each pixel is:", "body": "", "type": "choice", "options": ["linear regression only", "ordinal encoding", "batch sampling", "semantic image segmentation"], "answer": "semantic image segmentation"}, {"id": 9, "title": "Supervised learning means the model is trained with:", "body": "", "type": "choice", "options": ["only unlabeled inputs", "inputs and labels", "only random rewards", "no data"], "answer": "inputs and labels"}, {"id": 10, "title": "Unsupervised learning means the model:", "body": "", "type": "choice", "options": ["always predicts a continuous target", "must use y labels", "finds patterns without target labels", "cannot use clustering"], "answer": "finds patterns without target labels"}, {"id": 11, "title": "Association rule learning is used to find:", "body": "", "type": "choice", "options": ["the mean of a numerical column", "the train/test split ratio", "only geographical coordinates", "co-occurrence patterns between items"], "answer": "co-occurrence patterns between items"}, {"id": 12, "title": "Semi-supervised learning can combine a small amount of labeled data with a large amount of unlabeled data.", "body": "", "type": "choice", "options": ["False", "True"], "answer": "True"}, {"id": 13, "title": "Reinforcement learning is based on an agent learning from:", "body": "", "type": "choice", "options": ["only a fixed CSV header", "only missing values", "rewards and penalties", "only one-hot vectors"], "answer": "rewards and penalties"}, {"id": 14, "title": "Batch learning is also called:", "body": "", "type": "choice", "options": ["incremental learning", "streaming-only learning", "label smoothing", "offline learning"], "answer": "offline learning"}, {"id": 15, "title": "In batch learning, when new data arrives, the model usually must be retrained with the whole dataset or a new batch.", "body": "", "type": "choice", "options": ["False", "True"], "answer": "True"}, {"id": 16, "title": "Instance-based learning generalizes mainly by:", "body": "", "type": "choice", "options": ["always fitting a parametric equation", "removing all outliers", "comparing new data points to known examples using similarity", "using only labels without features"], "answer": "comparing new data points to known examples using similarity"}, {"id": 17, "title": "Model-based learning generalizes mainly by:", "body": "", "type": "choice", "options": ["memorizing only row indices", "never using parameters", "using only duplicate rows", "detecting patterns and building a predictive model"], "answer": "detecting patterns and building a predictive model"}, {"id": 18, "title": "Overfitting usually happens when the model is:", "body": "", "type": "choice", "options": ["too simple to learn patterns", "too complex and memorizes training data", "never trained", "only a column name"], "answer": "too complex and memorizes training data"}, {"id": 19, "title": "Underfitting usually happens when the model is:", "body": "", "type": "choice", "options": ["perfectly memorizing the training set", "using too many categories only", "too simple or features are not informative enough", "stored with joblib"], "answer": "too simple or features are not informative enough"}, {"id": 20, "title": "The error rate on new cases is called:", "body": "", "type": "choice", "options": ["training instance", "feature name", "column selector", "generalization error"], "answer": "generalization error"}, {"id": 21, "title": "The test set should usually be kept untouched until the final evaluation.", "body": "", "type": "choice", "options": ["False", "True"], "answer": "True"}, {"id": 22, "title": "What is the target variable in the California Housing project?", "body": "", "type": "choice", "options": ["ocean_proximity", "longitude", "median_house_value", "total_rooms"], "answer": "median_house_value"}, {"id": 23, "title": "The California Housing task is framed as:", "body": "", "type": "choice", "options": ["unsupervised clustering only", "reinforcement learning", "text classification", "supervised regression"], "answer": "supervised regression"}, {"id": 24, "title": "The housing problem is multiple regression because several input features are used to predict the target.", "body": "", "type": "choice", "options": ["False", "True"], "answer": "True"}, {"id": 25, "title": "The housing problem is multivariate regression because it predicts many target values for each district.", "body": "", "type": "choice", "options": ["True", "False"], "answer": "False"}, {"id": 26, "title": "For the housing project, plain batch learning is reasonable because:", "body": "", "type": "choice", "options": ["the target is categorical", "the dataset has no labels", "the model must update every second", "the data is small enough and there is no continuous flow requiring rapid updates"], "answer": "the data is small enough and there is no continuous flow requiring rapid updates"}, {"id": 27, "title": "The main purpose of checking the current solution is to:", "body": "", "type": "choice", "options": ["remove the test set", "get a reference for performance and insights", "force the use of neural networks", "convert all columns to strings"], "answer": "get a reference for performance and insights"}, {"id": 28, "title": "A data pipeline is:", "body": "", "type": "choice", "options": ["a single missing value", "only a scatter plot", "a sequence of data processing components", "a list of labels without features"], "answer": "a sequence of data processing components"}, {"id": 29, "title": "MAE measures:", "body": "", "type": "choice", "options": ["the square root of labels", "only the maximum error", "the number of features", "the average absolute error"], "answer": "the average absolute error"}, {"id": 30, "title": "RMSE is especially sensitive to:", "body": "", "type": "choice", "options": ["column names", "large errors and outliers", "CSV separators", "markdown titles"], "answer": "large errors and outliers"}, {"id": 31, "title": "RMSE is always greater than or equal to MAE.", "body": "", "type": "choice", "options": ["False", "True"], "answer": "True"}, {"id": 32, "title": "If the downstream system only needs categories like cheap/medium/expensive, the housing task should be framed as:", "body": "", "type": "choice", "options": ["univariate regression", "image segmentation", "association rule learning", "classification"], "answer": "classification"}, {"id": 33, "title": "Fill in the blank to load the housing CSV file.", "body": "```python\nhousing = pd.___(Path(\"datasets/housing/housing.csv\"))\n```", "type": "text", "options": [], "answer": "read_csv"}, {"id": 34, "title": "What does `housing.info()` show?", "body": "", "type": "choice", "options": ["only the first row", "only feature importances", "columns, non-null counts, dtypes, memory usage", "only test RMSE"], "answer": "columns, non-null counts, dtypes, memory usage"}, {"id": 35, "title": "Which column in the housing dataset is categorical/object?", "body": "", "type": "choice", "options": ["median_income", "total_rooms", "latitude", "ocean_proximity"], "answer": "ocean_proximity"}, {"id": 36, "title": "How many entries are in the full California Housing dataset?", "body": "", "type": "choice", "options": ["4622", "20640", "16512", "1834"], "answer": "20640"}, {"id": 37, "title": "Which feature has missing values in the housing dataset shown in the material?", "body": "", "type": "choice", "options": ["longitude", "median_income", "total_bedrooms", "ocean_proximity only"], "answer": "total_bedrooms"}, {"id": 38, "title": "Fill in the blank to create a random train/test split with 20% test data.", "body": "```python\ntrain_set, test_set = train_test_split(housing, test_size=___, random_state=42)\n```", "type": "text", "options": [], "answer": "0.2"}, {"id": 39, "title": "Stratified sampling ensures:", "body": "", "type": "choice", "options": ["equal feature scaling", "proportional representation of strata", "automatic model training", "removal of all outliers"], "answer": "proportional representation of strata"}, {"id": 40, "title": "In the material, `pd.cut()` is used to create:", "body": "", "type": "choice", "options": ["ocean_proximity", "final_rmse", "income_cat", "feature_importances_"], "answer": "income_cat"}, {"id": 41, "title": "What does `pd.cut()` do?", "body": "", "type": "choice", "options": ["Trains a regression model", "Encodes text with one-hot vectors", "Computes RMSE", "Discretizes continuous values into bins"], "answer": "Discretizes continuous values into bins"}, {"id": 42, "title": "Fill in the blank to create income categories.", "body": "```python\nhousing[\"income_cat\"] = pd.cut(housing[\"median_income\"], bins=[0., 1.5, 3.0, 4.5, 6., np.inf], labels=[1, 2, 3, 4, ___])\n```", "type": "text", "options": [], "answer": "5"}, {"id": 43, "title": "After creating a stratified split, `income_cat` should be kept forever as a training feature.", "body": "", "type": "choice", "options": ["True", "False"], "answer": "False"}, {"id": 44, "title": "Why should we explore and visualize only the training set?", "body": "", "type": "choice", "options": ["Because plotting test data is impossible", "Because the test set has no columns", "Because StandardScaler cannot handle test data", "To avoid data leakage from the test set"], "answer": "To avoid data leakage from the test set"}, {"id": 45, "title": "In geographical scatter plots, `alpha` controls:", "body": "", "type": "choice", "options": ["the target variable", "point transparency", "the number of folds", "the missing-value strategy"], "answer": "point transparency"}, {"id": 46, "title": "In the geographical visualization, the x and y axes are usually:", "body": "", "type": "choice", "options": ["median_income and median_house_value only", "order_id and quantity", "longitude and latitude", "split0 and split1"], "answer": "longitude and latitude"}, {"id": 47, "title": "The `c=\"median_house_value\"` argument in the housing scatter plot is used to:", "body": "", "type": "choice", "options": ["drop the target column", "calculate RMSE", "make categories ordinal", "color points by house value"], "answer": "color points by house value"}, {"id": 48, "title": "Fill in the blank to calculate correlations only on numeric columns.", "body": "```python\ncorr_matrix = housing.corr(____=True)\n```", "type": "text", "options": [], "answer": "numeric_only"}, {"id": 49, "title": "Which feature has the strongest positive correlation with `median_house_value` in the shown correlation output?", "body": "", "type": "choice", "options": ["population", "longitude", "median_income", "latitude"], "answer": "median_income"}, {"id": 50, "title": "Fill in the blank for the attribute combination.", "body": "```python\nhousing[\"rooms_per_house\"] = housing[\"total_rooms\"] / housing[\"___\"]\n```", "type": "text", "options": [], "answer": "households"}, {"id": 51, "title": "Fill in the blank for the attribute combination.", "body": "```python\nhousing[\"bedrooms_ratio\"] = housing[\"total_bedrooms\"] / housing[\"___\"]\n```", "type": "text", "options": [], "answer": "total_rooms"}, {"id": 52, "title": "Fill in the blank for the attribute combination.", "body": "```python\nhousing[\"people_per_house\"] = housing[\"population\"] / housing[\"___\"]\n```", "type": "text", "options": [], "answer": "households"}, {"id": 53, "title": "Before preparing features, labels are usually separated by:", "body": "", "type": "choice", "options": ["dropping all numerical columns", "using only the test set", "converting labels to ocean_proximity", "dropping `median_house_value` from X and copying it as y"], "answer": "dropping `median_house_value` from X and copying it as y"}, {"id": 54, "title": "Which Scikit-Learn transformer is used to fill missing numerical values with the median?", "body": "", "type": "choice", "options": ["OneHotEncoder", "SimpleImputer", "GridSearchCV", "RandomForestRegressor"], "answer": "SimpleImputer"}, {"id": 55, "title": "Fill in the blank to create a median imputer.", "body": "```python\nimputer = SimpleImputer(strategy=\"___\")\n```", "type": "text", "options": [], "answer": "median"}, {"id": 56, "title": "What does `imputer.fit()` learn from the data?", "body": "", "type": "choice", "options": ["the final test RMSE", "the best random forest depth only", "the label names", "the replacement statistics, such as medians"], "answer": "the replacement statistics, such as medians"}, {"id": 57, "title": "What is the output of `imputer.transform()`?", "body": "", "type": "choice", "options": ["Python dictionary", "NumPy array", "Raw PDF file", "Matplotlib axis only"], "answer": "NumPy array"}, {"id": 58, "title": "Ordinal encoding converts categories into:", "body": "", "type": "choice", "options": ["RMSE scores", "missing values", "integer codes", "scatter plot points"], "answer": "integer codes"}, {"id": 59, "title": "The main disadvantage of ordinal encoding for unordered categories is:", "body": "", "type": "choice", "options": ["it cannot handle any category", "it always removes rows", "it changes test size", "it introduces false ordering"], "answer": "it introduces false ordering"}, {"id": 60, "title": "One-hot encoding creates:", "body": "", "type": "choice", "options": ["one continuous target per row", "one binary feature per category", "one KMeans center only", "one validation set only"], "answer": "one binary feature per category"}, {"id": 61, "title": "OneHotEncoder returns a sparse matrix by default.", "body": "", "type": "choice", "options": ["False", "True"], "answer": "True"}, {"id": 62, "title": "Fill in the blank to return a dense array from OneHotEncoder.", "body": "```python\ncat_encoder = OneHotEncoder(sparse_output=___)\n```", "type": "text", "options": [], "answer": "False"}, {"id": 63, "title": "What happens if OneHotEncoder sees an unknown category and `handle_unknown` is not set to `ignore`?", "body": "", "type": "choice", "options": ["It automatically predicts the target", "It raises an error", "It deletes the whole dataset", "It performs standardization"], "answer": "It raises an error"}, {"id": 64, "title": "If `handle_unknown=\"ignore\"`, an unknown category is represented as:", "body": "", "type": "choice", "options": ["all ones", "the median value", "all zeros in the one-hot part", "the RMSE score"], "answer": "all zeros in the one-hot part"}, {"id": 65, "title": "MinMaxScaler transforms features to:", "body": "", "type": "choice", "options": ["always mean 0 and std 1", "only integer labels", "only sparse matrices", "a chosen range, often [0, 1]"], "answer": "a chosen range, often [0, 1]"}, {"id": 66, "title": "StandardScaler transforms features to have:", "body": "", "type": "choice", "options": ["minimum 0 and maximum 1 only", "mean 0 and standard deviation 1", "one column per category", "no variance"], "answer": "mean 0 and standard deviation 1"}, {"id": 67, "title": "Standardization restricts all values to the range [0, 1].", "body": "", "type": "choice", "options": ["True", "False"], "answer": "False"}, {"id": 68, "title": "Why is MinMaxScaler problematic when extreme outliers exist?", "body": "", "type": "choice", "options": ["It removes all outliers automatically", "It converts all columns to strings", "It creates target labels", "It can compress normal values into a narrow range"], "answer": "It can compress normal values into a narrow range"}, {"id": 69, "title": "Which scaling method is most robust to outliers among the listed options?", "body": "", "type": "choice", "options": ["MinMaxScaler", "RobustScaler", "StandardScaler", "Normalizer"], "answer": "RobustScaler"}, {"id": 70, "title": "For a positive heavy-tailed feature, the recommended transformation before scaling is often:", "body": "", "type": "choice", "options": ["one-hot encoding", "dropping the target", "log transformation", "using the test set"], "answer": "log transformation"}, {"id": 71, "title": "Fill in the blank to transform the heavy-tailed `population` feature.", "body": "```python\nhousing[\"population\"].apply(___)\n```", "type": "text", "options" answer": "True", "id": 169}, {"title": "What happens if OneHotEncoder encounters an unseen category without `handle_unknown=\"ignore\"`?", "body": "", "type": "choice", "options": ["It assigns zero vector", "It will ignore it", "It skips the row", "It raises an error"], "answer": "It raises an error", "id": 170}, {"title": "Adding `TransformerMixin` as a base class when creating a custom transformer is important because it provides the `get_params()` method, which is essential for hyperparameter tuning.", "body": "", "type": "choice", "options": ["True", "False"], "answer": "False", "id": 171}, {"title": "`ClusterSimilarity` can be applied to multi-dimensional inputs.", "body": "", "type": "choice", "options": ["False", "True"], "answer": "True", "id": 172}, {"title": "Which statement is true about `FunctionTransformer`?", "body": "", "type": "choice", "options": ["It must include `inverse_transform`", "It cannot be used with pipelines", "It requires training data", "It supports parameters via `kw_args`"], "answer": "It supports parameters via `kw_args`", "id": 173}, {"title": "In `ClusterSimilarity`, if you pass `sample_weight=housing_labels`, expensive houses receive more influence when determining cluster centers.", "body": "", "type": "choice", "options": ["False", "True"], "answer": "True", "id": 174}, {"title": "All scikit-Learn transformers have an `inverse_transform()` method, making it easy to compute the inverse of their transformations.", "body": "", "type": "choice", "options": ["True", "False"], "answer": "False", "id": 175}, {"title": "Fill in the missing argument.", "body": "```python\nsimilarity = rbf_kernel(X, centers, ____ = 0.02)\n```", "type": "text", "options": [], "answer": "gamma", "id": 176}, {"title": "The `MinMaxScaler` is more resistant to outliers than the `StandardScaler`.", "body": "", "type": "choice", "options": ["True", "False"], "answer": "False", "id": 177}, {"title": "What is the purpose of the `ClusterSimilarity` transformer?", "body": "", "type": "choice", "options": ["PCA projections", "One-hot encoded cluster IDs", "RBF similarities to KMeans cluster centers", "Distances to KMeans cluster centers"], "answer": "RBF similarities to KMeans cluster centers", "id": 178}, {"title": "What happens to cluster centers when `sample_weight` is used?", "body": "", "type": "choice", "options": ["Centers are unchanged", "Centers move toward lower-valued samples", "KMeans runs fewer iterations", "Centers move toward higher-weighted samples"], "answer": "Centers move toward higher-weighted samples", "id": 179}, {"title": "Fill in the blank. The following code is part of a custom Transformer class:", "body": "```python\ndef fit(self, X, y=_____):\n```", "type": "text", "options": [], "answer": "None", "id": 180}];
let questions = [...ORIGINAL_QUESTIONS];
let current = 0;
let examMode = false;
const STORAGE_KEY = 'ml_quiz_180_state_v2_shuffled_options';
let state = loadState();

function defaultState() {
  const answers = {};
  const checked = {};
  const correct = {};
  return { answers, checked, correct, order: questions.map(q => q.id) };
}
function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (saved && saved.answers) return saved;
  } catch(e) {}
  return defaultState();
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]));
}
function renderBody(body) {
  if (!body) return '';
  return body.replace(/```(?:python)?\n([\s\S]*?)```/g, (_, code) => `<pre><code>${escapeHtml(code.trim())}</code></pre>`)
             .replace(/`([^`]+)`/g, '<code>$1</code>')
             .replace(/\n/g, '<br>');
}
function normalizeAnswer(v) {
  return String(v ?? '').trim().replace(/^`|`$/g, '').replace(/\s+/g, '').toLowerCase();
}
function isCorrect(q, value) {
  if (q.type === 'text') return normalizeAnswer(value) === normalizeAnswer(q.answer);
  return String(value ?? '') === String(q.answer);
}
function currentQuestion() { return questions[current]; }
function renderQuestion() {
  const q = currentQuestion();
  const userValue = state.answers[q.id] ?? '';
  const isChecked = !!state.checked[q.id];
  const qBox = document.getElementById('questionBox');
  const typeLabel = q.type === 'text' ? 'Fill in the blank' : (q.options.length === 2 && q.options.includes('True') && q.options.includes('False') ? 'True / False' : 'Multiple choice');
  let html = `
    <div class="question-meta">
      <span class="pill blue">Question ${current + 1} / ${questions.length}</span>
      <span class="pill gray">${typeLabel}</span>
      <span class="pill gray">1 point</span>
    </div>
    <h2>${escapeHtml(q.title)}</h2>
    <div class="body">${renderBody(q.body)}</div>
  `;
  if (q.type === 'choice') {
    html += '<div class="options">';
    q.options.forEach((opt, idx) => {
      let cls = 'option';
      if (isChecked && !examMode) {
        if (opt === q.answer) cls += ' correct';
        else if (opt === userValue) cls += ' incorrect';
      }
      html += `<label class="${cls}"><input type="radio" name="answer" value="${escapeHtml(opt)}" ${opt === userValue ? 'checked' : ''}> <span>${escapeHtml(opt)}</span></label>`;
    });
    html += '</div>';
  } else {
    html += `<input class="text-answer" id="textAnswer" placeholder="Введите ответ" value="${escapeHtml(userValue)}" />`;
  }
  qBox.innerHTML = html;
  document.querySelectorAll('input[name="answer"]').forEach(input => {
    input.addEventListener('change', e => { state.answers[q.id] = e.target.value; saveState(); updateStats(); renderGrid(); clearFeedback(); });
  });
  const textInput = document.getElementById('textAnswer');
  if (textInput) {
    textInput.addEventListener('input', e => { state.answers[q.id] = e.target.value; saveState(); updateStats(); renderGrid(); clearFeedback(); });
    textInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkCurrent(); });
  }
  renderFeedback();
  updateStats();
  renderGrid();
}
function clearFeedback() {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';
}
function renderFeedback(forceShowAnswer=false) {
  const q = currentQuestion();
  const fb = document.getElementById('feedback');
  if (examMode && !forceShowAnswer) { clearFeedback(); return; }
  if (forceShowAnswer) {
    fb.className = 'feedback good';
    fb.innerHTML = `Correct answer: <code>${escapeHtml(q.answer)}</code>`;
    return;
  }
  if (!state.checked[q.id]) { clearFeedback(); return; }
  const good = !!state.correct[q.id];
  fb.className = 'feedback ' + (good ? 'good' : 'bad');
  fb.innerHTML = good ? 'Correct ✅' : `Incorrect ❌ Correct answer: <code>${escapeHtml(q.answer)}</code>`;
}
function checkCurrent() {
  const q = currentQuestion();
  const val = state.answers[q.id];
  if (val === undefined || String(val).trim() === '') {
    const fb = document.getElementById('feedback');
    fb.className = 'feedback bad';
    fb.textContent = 'Choose or enter an answer first.';
    return;
  }
  state.checked[q.id] = true;
  state.correct[q.id] = isCorrect(q, val);
  saveState();
  renderQuestion();
}
function updateStats() {
  const total = questions.length;
  const answered = questions.filter(q => state.answers[q.id] !== undefined && String(state.answers[q.id]).trim() !== '').length;
  const checked = questions.filter(q => state.checked[q.id]).length;
  const correct = questions.filter(q => state.correct[q.id]).length;
  const wrong = checked - correct;
  document.getElementById('answeredStat').textContent = answered;
  document.getElementById('correctStat').textContent = correct;
  document.getElementById('wrongStat').textContent = wrong;
  document.getElementById('progressText').textContent = `${answered} / ${total} answered`;
  const pct = Math.round(answered / total * 100);
  document.getElementById('percentText').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
}
function renderGrid() {
  const grid = document.getElementById('questionGrid');
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  grid.innerHTML = '';
  questions.forEach((q, idx) => {
    if (query && !(q.title.toLowerCase().includes(query) || String(q.id).includes(query))) return;
    let cls = 'qbtn';
    if (idx === current) cls += ' active';
    if (state.answers[q.id] !== undefined && String(state.answers[q.id]).trim() !== '') cls += ' answered';
    if (state.checked[q.id] && state.correct[q.id]) cls += ' correct';
    if (state.checked[q.id] && state.correct[q.id] === false) cls += ' incorrect';
    const btn = document.createElement('button');
    btn.className = cls;
    btn.textContent = idx + 1;
    btn.onclick = () => { current = idx; document.getElementById('resultsBox').classList.remove('show'); renderQuestion(); };
    grid.appendChild(btn);
  });
}
function finishTest() {
  questions.forEach(q => {
    const val = state.answers[q.id];
    if (val !== undefined && String(val).trim() !== '') {
      state.checked[q.id] = true;
      state.correct[q.id] = isCorrect(q, val);
    }
  });
  saveState();
  const answered = questions.filter(q => state.answers[q.id] !== undefined && String(state.answers[q.id]).trim() !== '').length;
  const correct = questions.filter(q => state.correct[q.id]).length;
  const pct = Math.round(correct / questions.length * 100);
  const mistakes = questions.filter(q => state.checked[q.id] && !state.correct[q.id]);
  const box = document.getElementById('resultsBox');
  box.classList.add('show');
  box.innerHTML = `
    <p class="small">Final result</p>
    <p class="result-score">${correct} / ${questions.length} (${pct}%)</p>
    <p>Answered: <b>${answered}</b>. Wrong checked answers: <b>${mistakes.length}</b>.</p>
    <div class="mistakes">
      ${mistakes.length ? mistakes.map(q => `<div class="mistake"><b>#${questions.indexOf(q)+1}. ${escapeHtml(q.title)}</b><br><span class="small">Your answer: ${escapeHtml(state.answers[q.id]) || '—'}</span><br><span class="small">Correct: <code>${escapeHtml(q.answer)}</code></span></div>`).join('') : '<div class="mistake">No mistakes in checked answers ✅</div>'}
    </div>`;
  updateStats(); renderGrid(); renderQuestion();
  box.scrollIntoView({behavior:'smooth', block:'start'});
}
function shuffleQuestions() {
  questions = [...questions].sort(() => Math.random() - 0.5);
  current = 0;
  document.getElementById('resultsBox').classList.remove('show');
  renderQuestion();
}
function resetAll() {
  if (!confirm('Reset all answers?')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = defaultState();
  current = 0;
  questions = [...ORIGINAL_QUESTIONS];
  document.getElementById('resultsBox').classList.remove('show');
  renderQuestion();
}
document.getElementById('prevBtn').onclick = () => { if (current > 0) current--; document.getElementById('resultsBox').classList.remove('show'); renderQuestion(); };
document.getElementById('nextBtn').onclick = () => { if (current < questions.length - 1) current++; document.getElementById('resultsBox').classList.remove('show'); renderQuestion(); };
document.getElementById('checkBtn').onclick = checkCurrent;
document.getElementById('finishBtn').onclick = finishTest;
document.getElementById('showAnswerBtn').onclick = () => renderFeedback(true);
document.getElementById('shuffleBtn').onclick = shuffleQuestions;
document.getElementById('resetBtn').onclick = resetAll;
document.getElementById('examBtn').onclick = () => {
  examMode = !examMode;
  document.getElementById('examBtn').textContent = 'Exam mode: ' + (examMode ? 'ON' : 'OFF');
  document.getElementById('modeLabel').textContent = examMode ? 'Exam' : 'Practice';
  renderQuestion();
};
document.getElementById('searchInput').addEventListener('input', renderGrid);
document.addEventListener('keydown', e => {
  if (e.altKey && e.key === 'ArrowRight') document.getElementById('nextBtn').click();
  if (e.altKey && e.key === 'ArrowLeft') document.getElementById('prevBtn').click();
});
renderQuestion();
</script>
</body>
</html>
